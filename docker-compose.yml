version: '3.8'

services:
  # El backend usa por defecto PostgreSQL instalado en Windows (puerto 5432 en el host).
  # Este servicio es un PostgreSQL de respaldo en Docker; se expone en 5434 del host para no chocar con el local.
  postgres:
    image: postgres:16
    container_name: lumina_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina1234
      POSTGRES_DB: lumina
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lumina_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: